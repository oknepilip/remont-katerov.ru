<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'IBM Plex Mono', monospace; min-height: 100vh; padding: 24px 16px; }

  h1 { font-family: 'Syne', sans-serif; font-size: 24px; letter-spacing: -0.5px; }

  .header { max-width: 680px; margin: 0 auto 24px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .header-meta { color: #555; font-size: 12px; margin-top: 4px; }
  .header-buttons { display: flex; gap: 8px; flex-wrap: wrap; }

  button { font-family: 'IBM Plex Mono', monospace; cursor: pointer; transition: opacity 0.15s; }
  button:disabled { opacity: 0.3; cursor: default; }

  .btn { border-radius: 7px; padding: 8px 16px; font-size: 12px; border: none; }
  .btn-copy { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; }
  .btn-copy.ok { background: #12261e; border-color: #3fb950; color: #3fb950; }
  .btn-export { background: #1f6feb22; border: 1px solid #1f6feb; color: #58a6ff; }
  .btn-add { background: #238636; color: #fff; font-weight: 700; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: all 0.15s; }

  .list { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }

  .card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start; transition: border-color 0.15s; }
  .card:hover { border-color: #30363d; }
  .card-idx { color: #555; font-size: 13px; min-width: 22px; padding-top: 2px; }
  .card-body { flex: 1; min-width: 0; }
  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .card-title { color: #e6edf3; font-weight: 700; font-size: 14px; }
  .card-sub { color: #7d8590; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { color: #444; font-size: 11px; margin-top: 4px; }
  .card-controls { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .ctrl-btn { background: none; border: 1px solid #21262d; border-radius: 5px; color: #7d8590; padding: 4px 8px; font-size: 13px; }
  .ctrl-btn.blue { color: #58a6ff; }
  .ctrl-btn.red { color: #f85149; }

  .tag-badge { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; padding: 2px 8px; border-radius: 12px; }

  .empty { color: #555; text-align: center; padding: 40px; }
  .footer { color: #333; font-size: 11px; text-align: center; margin-top: 32px; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 28px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; }
  .modal-close { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }

  label.field-label { display: block; color: #7d8590; font-size: 12px; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; }
  input.field, textarea.field { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #e6edf3; font-size: 14px; margin-bottom: 14px; font-family: 'IBM Plex Mono', monospace; outline: none; }
  input.field:focus, textarea.field:focus { border-color: #58a6ff; }
  textarea.field { resize: vertical; }

  .tag-picker { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tag-pick-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: all 0.15s; }

  .media-header { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; margin-bottom: 8px; }
  .media-list { background: #0d1117; border-radius: 8px; padding: 12px; margin-bottom: 16px; max-height: 200px; overflow-y: auto; }
  .media-list.empty-list { padding: 0; }
  .media-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .media-item:last-child { margin-bottom: 0; }
  .media-num { color: #888; font-size: 12px; min-width: 20px; }
  .media-input { flex: 1; background: #111; border: 1px solid #333; border-radius: 4px; padding: 5px 8px; color: #ccc; font-size: 13px; font-family: 'IBM Plex Mono', monospace; outline: none; }
  .media-remove { background: none; border: 1px solid #444; border-radius: 4px; color: #f66; padding: 3px 8px; font-size: 12px; cursor: pointer; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  .btn-cancel { background: none; border: 1px solid #333; border-radius: 6px; color: #888; padding: 8px 20px; cursor: pointer; }
  .btn-save { border: none; border-radius: 6px; color: #fff; padding: 8px 24px; font-weight: 700; }

  .btn-add-media { background: #1f6feb22; border: 1px solid #1f6feb; border-radius: 6px; color: #58a6ff; padding: 4px 12px; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Projects Editor</h1>
      <p class="header-meta" id="count-label"></p>
    </div>
    <div class="header-buttons">
      <button class="btn btn-copy" id="btn-copy" onclick="copyJson()">Копировать JSON</button>
      <button class="btn btn-export" onclick="exportJson()">↓ Скачать JSON</button>
      <button class="btn btn-add" onclick="openAdd()">+ Добавить</button>
    </div>
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="list" id="list"></div>

<p class="footer">После редактирования скачайте JSON и замените файл projects.json на сервере</p>

<!-- Modal -->
<div class="overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Новый проект</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <label class="field-label">Тег</label>
    <div class="tag-picker" id="tag-picker"></div>

    <label class="field-label">Название *</label>
    <input class="field" id="f-title" placeholder="Название проекта">

    <label class="field-label">Описание</label>
    <textarea class="field" id="f-sub" rows="2" placeholder="Краткое описание работ"></textarea>

    <label class="field-label">Обложка (путь к файлу)</label>
    <input class="field" id="f-cover" placeholder="images/photo_XX.jpg">

    <div class="media-header">
      <label class="field-label" style="margin:0">Медиафайлы (<span id="media-count">0</span>)</label>
      <button class="btn-add-media" onclick="addMedia()">+ Добавить</button>
    </div>
    <div class="media-list" id="media-list">
      <p style="color:#555;font-size:12px;text-align:center;padding:12px">Нет медиафайлов</p>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" id="btn-save" onclick="saveProject()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const TAGS = ["МЕХАНИКА", "ЗАПЧАСТИ", "КОРПУС", "ТО"];
const TAG_COLORS = {
  МЕХАНИКА: { bg: "#1a3a5c", text: "#5eb8ff" },
  ЗАПЧАСТИ: { bg: "#2d1a1a", text: "#ff7a5c" },
  КОРПУС:   { bg: "#1a2d1a", text: "#6edc6e" },
  ТО:       { bg: "#2d2a1a", text: "#ffd966" },
};

let projects = [
  { tag: "МЕХАНИКА", title: "Генератор подвесного лодочного мотора", sub: "Ремонт генератора ПЛМ", cover: "images/photo_02.jpg", media: [{ type: "img", dataUrl: "images/photo_02.jpg" }, { type: "img", dataUrl: "images/photo_03.jpg" }, { type: "img", dataUrl: "images/photo_04.jpg" }, { type: "img", dataUrl: "images/photo_05.jpg" }, { type: "img", dataUrl: "images/photo_06.jpg" }] },
  { tag: "МЕХАНИКА", title: "УПОК VOLVO PENTA DPH", sub: "Устранение эмульсии и замена шестерней в колонке DPH C", cover: "images/photo_07.jpg", media: [{ type: "img", dataUrl: "images/photo_07.jpg" }, { type: "img", dataUrl: "images/photo_08.jpg" }, { type: "img", dataUrl: "images/photo_09.jpg" }] },
  { tag: "МЕХАНИКА", title: "КС110 Рулевое устройство", sub: "Замена рулевой рейки на КС110", cover: "images/photo_10.jpg", media: [{ type: "img", dataUrl: "images/photo_10.jpg" }, { type: "img", dataUrl: "images/photo_11.jpg" }, { type: "img", dataUrl: "images/photo_12.jpg" }] },
  { tag: "ЗАПЧАСТИ", title: "Mercury QSD 4.2", sub: "Поставка и установка стационарного двигателя Mercury QSD 4.2 350 ЛС", cover: "images/photo_13.jpg", media: [{ type: "img", dataUrl: "images/photo_13.jpg" }] },
  { tag: "КОРПУС",   title: "North Silver 1440", sub: "Грунтовка и покраска самополирующимся необрастающим покрытием", cover: "images/photo_14.jpg", media: [{ type: "img", dataUrl: "images/photo_14.jpg" }, { type: "img", dataUrl: "images/photo_15.jpg" }] },
  { tag: "МЕХАНИКА", title: "Mercury Verado и Tohatsu", sub: "Спасение утопленных ПЛМ Mercury и Tohatsu", cover: "images/photo_16.jpg", media: [{ type: "img", dataUrl: "images/photo_16.jpg" }, { type: "img", dataUrl: "images/photo_17.jpg" }] },
  { tag: "МЕХАНИКА", title: "ЯМЗ 361", sub: "Регулировка топливной аппаратуры (ТНВД и форсунок) и зазоров клапанов на ЯМЗ 361", cover: "images/photo_18.jpg", media: [{ type: "img", dataUrl: "images/photo_18.jpg" }, { type: "img", dataUrl: "images/photo_19.jpg" }] },
  { tag: "КОРПУС",   title: "Грунтовка и покраска алюминия", sub: "Грунтовка и покраска алюминиевого катера", cover: "images/photo_20.jpg", media: [{ type: "img", dataUrl: "images/photo_20.jpg" }, { type: "img", dataUrl: "images/photo_21.jpg" }, { type: "img", dataUrl: "images/photo_22.jpg" }, { type: "img", dataUrl: "images/photo_23.jpg" }, { type: "img", dataUrl: "images/photo_24.jpg" }, { type: "img", dataUrl: "images/photo_25.jpg" }] },
  { tag: "ЗАПЧАСТИ", title: "Nanni Z6.300", sub: "Поставка запчастей и ТО 1000 часов Nanni Z6.300", cover: "images/photo_26.jpg", media: [{ type: "img", dataUrl: "images/photo_26.jpg" }, { type: "img", dataUrl: "images/photo_27.jpg" }, { type: "img", dataUrl: "images/photo_28.jpg" }, { type: "img", dataUrl: "images/photo_29.jpg" }] },
  { tag: "ЗАПЧАСТИ", title: "Volvo Penta DPH C", sub: "Замена уплотнений редуктора. Переуплотнение Volvo Penta DPH C", cover: "images/photo_30.jpg", media: [{ type: "img", dataUrl: "images/photo_30.jpg" }, { type: "img", dataUrl: "images/photo_31.jpg" }, { type: "img", dataUrl: "images/photo_32.jpg" }] },
  { tag: "ТО",       title: "ТО Volvo Penta D6", sub: "Плановое ТО Volvo Penta D6", cover: "images/photo_33.jpg", media: [{ type: "img", dataUrl: "images/photo_33.jpg" }] },
];

let filterTag = "ВСЕ";
let modalMode = null; // "add" | "edit"
let editIndex = -1;
let modalMedia = [];
let modalTag = "МЕХАНИКА";

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  document.getElementById("count-label").textContent = projects.length + " проектов";
  renderFilters();
  renderList();
}

function renderFilters() {
  const el = document.getElementById("filters");
  const allTags = ["ВСЕ", ...TAGS];
  el.innerHTML = allTags.map(t => {
    const tc = TAG_COLORS[t] || { text: "#aaa", bg: "#1a1a1a" };
    const count = t === "ВСЕ" ? projects.length : projects.filter(p => p.tag === t).length;
    const active = filterTag === t;
    const bc = active ? (t === "ВСЕ" ? "#8b949e" : tc.text) : "#21262d";
    const bg = active ? (t === "ВСЕ" ? "#21262d" : tc.bg) : "transparent";
    const col = active ? (t === "ВСЕ" ? "#c9d1d9" : tc.text) : "#555";
    return `<button class="filter-btn" onclick="setFilter('${t}')"
      style="border-color:${bc};background:${bg};color:${col}"
    >${t} <span style="opacity:.6">${count}</span></button>`;
  }).join("");
}

function renderList() {
  const el = document.getElementById("list");
  const indices = filterTag === "ВСЕ"
    ? projects.map((_, i) => i)
    : projects.map((_, i) => i).filter(i => projects[i].tag === filterTag);

  if (indices.length === 0) {
    el.innerHTML = `<p class="empty">Нет проектов в этой категории</p>`;
    return;
  }

  el.innerHTML = indices.map(i => {
    const p = projects[i];
    const tc = TAG_COLORS[p.tag] || { bg: "#1a1a2e", text: "#aaa" };
    return `
    <div class="card">
      <span class="card-idx">${i + 1}</span>
      <div class="card-body">
        <div class="card-top">
          <span class="tag-badge" style="background:${tc.bg};color:${tc.text};border:1px solid ${tc.text}33">${p.tag}</span>
          <span class="card-title">${esc(p.title)}</span>
        </div>
        <p class="card-sub">${esc(p.sub)}</p>
        <p class="card-meta">${esc(p.cover)} · ${p.media.length} фото</p>
      </div>
      <div class="card-controls">
        <button class="ctrl-btn" onclick="moveUp(${i})" ${i === 0 ? "disabled" : ""} title="Вверх">↑</button>
        <button class="ctrl-btn" onclick="moveDown(${i})" ${i === projects.length - 1 ? "disabled" : ""} title="Вниз">↓</button>
        <button class="ctrl-btn blue" onclick="openEdit(${i})" title="Редактировать">✎</button>
        <button class="ctrl-btn red" onclick="deleteProject(${i})" title="Удалить">✕</button>
      </div>
    </div>`;
  }).join("");
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Actions ───────────────────────────────────────────────────────────────────

function setFilter(t) { filterTag = t; render(); }

function moveUp(i) {
  if (i === 0) return;
  [projects[i - 1], projects[i]] = [projects[i], projects[i - 1]];
  render();
}

function moveDown(i) {
  if (i === projects.length - 1) return;
  [projects[i + 1], projects[i]] = [projects[i], projects[i + 1]];
  render();
}

function deleteProject(i) {
  if (confirm("Удалить проект «" + projects[i].title + "»?")) {
    projects.splice(i, 1);
    render();
  }
}

function exportJson() {
  const blob = new Blob([JSON.stringify(projects, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "projects.json";
  a.click();
}

function copyJson() {
  navigator.clipboard.writeText(JSON.stringify(projects, null, 2)).then(() => {
    const btn = document.getElementById("btn-copy");
    btn.textContent = "✓ Скопировано";
    btn.classList.add("ok");
    setTimeout(() => { btn.textContent = "Копировать JSON"; btn.classList.remove("ok"); }, 2000);
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function openAdd() {
  modalMode = "add";
  modalTag = "МЕХАНИКА";
  modalMedia = [];
  document.getElementById("modal-title").textContent = "Новый проект";
  document.getElementById("f-title").value = "";
  document.getElementById("f-sub").value = "";
  document.getElementById("f-cover").value = "";
  renderTagPicker();
  renderModalMedia();
  updateSaveBtn();
  document.getElementById("modal").style.display = "flex";
}

function openEdit(i) {
  modalMode = "edit";
  editIndex = i;
  const p = projects[i];
  modalTag = p.tag;
  modalMedia = p.media.map(m => ({ ...m }));
  document.getElementById("modal-title").textContent = "Редактировать проект";
  document.getElementById("f-title").value = p.title;
  document.getElementById("f-sub").value = p.sub;
  document.getElementById("f-cover").value = p.cover;
  renderTagPicker();
  renderModalMedia();
  updateSaveBtn();
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function renderTagPicker() {
  const el = document.getElementById("tag-picker");
  el.innerHTML = TAGS.map(t => {
    const tc = TAG_COLORS[t];
    const active = modalTag === t;
    return `<button class="tag-pick-btn" onclick="pickTag('${t}')"
      style="border:1px solid ${active ? tc.text : "#333"};background:${active ? tc.bg : "#0d1117"};color:${active ? tc.text : "#666"}"
    >${t}</button>`;
  }).join("");
}

function pickTag(t) { modalTag = t; renderTagPicker(); }

function renderModalMedia() {
  const el = document.getElementById("media-list");
  document.getElementById("media-count").textContent = modalMedia.length;
  if (modalMedia.length === 0) {
    el.className = "media-list empty-list";
    el.innerHTML = `<p style="color:#555;font-size:12px;text-align:center;padding:12px">Нет медиафайлов</p>`;
    return;
  }
  el.className = "media-list";
  el.innerHTML = modalMedia.map((m, i) => `
    <div class="media-item">
      <span class="media-num">${i + 1}.</span>
      <input class="media-input" value="${esc(m.dataUrl)}" placeholder="images/photo_XX.jpg"
        onchange="updateMedia(${i}, this.value)" oninput="updateMedia(${i}, this.value)">
      <button class="media-remove" onclick="removeMedia(${i})">✕</button>
    </div>
  `).join("");
}

function addMedia() {
  modalMedia.push({ type: "img", dataUrl: "" });
  renderModalMedia();
}

function removeMedia(i) {
  modalMedia.splice(i, 1);
  renderModalMedia();
}

function updateMedia(i, val) {
  modalMedia[i].dataUrl = val;
}

function updateSaveBtn() {
  const btn = document.getElementById("btn-save");
  const valid = document.getElementById("f-title").value.trim() !== "";
  btn.style.background = valid ? "#1f6feb" : "#111";
  btn.style.color = valid ? "#fff" : "#444";
  btn.style.cursor = valid ? "pointer" : "default";
}

document.getElementById("f-title").addEventListener("input", updateSaveBtn);

function saveProject() {
  const title = document.getElementById("f-title").value.trim();
  if (!title) return;
  const data = {
    tag: modalTag,
    title,
    sub: document.getElementById("f-sub").value.trim(),
    cover: document.getElementById("f-cover").value.trim(),
    media: modalMedia.map(m => ({ ...m })),
  };
  if (modalMode === "add") {
    projects.push(data);
  } else {
    projects[editIndex] = data;
  }
  closeModal();
  render();
}

// Close on overlay click
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
