<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0d1117;color:#e6edf3;font-family:'IBM Plex Mono',monospace;min-height:100vh;padding:24px 16px;}
  h1{font-family:'Syne',sans-serif;font-size:24px;letter-spacing:-0.5px;}

  /* HEADER */
  .header{max-width:720px;margin:0 auto 24px;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
  .header-meta{color:#555;font-size:12px;margin-top:4px;}
  .header-buttons{display:flex;gap:8px;flex-wrap:wrap;}

  /* BUTTONS */
  button{font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:opacity 0.15s;}
  .btn{border-radius:7px;padding:8px 16px;font-size:12px;}
  .btn-load{background:#21262d;border:1px solid #30363d;color:#c9d1d9;}
  .btn-load:hover{border-color:#8b949e;}
  .btn-copy{background:#21262d;border:1px solid #30363d;color:#c9d1d9;}
  .btn-copy.ok{background:#12261e;border-color:#3fb950;color:#3fb950;}
  .btn-export{background:#1f6feb22;border:1px solid #1f6feb;color:#58a6ff;}
  .btn-add{background:#238636;border:none;color:#fff;font-weight:700;}
  .btn-cancel{background:none;border:1px solid #333;border-radius:6px;color:#888;padding:8px 20px;}
  .btn-save{border:none;border-radius:6px;color:#fff;padding:8px 24px;font-weight:700;background:#1f6feb;}
  .btn-save:disabled{background:#111;color:#444;cursor:default;}

  /* SEARCH */
  .search-wrap{max-width:720px;margin:0 auto 12px;position:relative;}
  .search-wrap input{width:100%;background:#161b22;border:1px solid #21262d;border-radius:7px;padding:10px 14px 10px 38px;color:#e6edf3;font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
  .search-wrap input:focus{border-color:#58a6ff;}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);stroke:#555;fill:none;width:15px;height:15px;stroke-width:2;}

  /* FILTERS */
  .filters{max-width:720px;margin:0 auto 16px;display:flex;gap:6px;flex-wrap:wrap;}
  .filter-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all 0.15s;}

  /* LIST */
  .list{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:8px;}

  /* CARD */
  .card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;transition:border-color 0.15s;}
  .card:hover{border-color:#30363d;}
  .card-idx{color:#555;font-size:13px;min-width:22px;padding-top:2px;flex-shrink:0;}
  .card-body{flex:1;min-width:0;}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
  .card-title{color:#e6edf3;font-weight:700;font-size:14px;}
  .card-desc{color:#7d8590;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-meta{color:#444;font-size:11px;margin-top:4px;font-family:monospace;}
  .card-controls{display:flex;gap:4px;align-items:center;flex-shrink:0;}
  .ctrl-btn{background:none;border:1px solid #21262d;border-radius:5px;color:#7d8590;padding:4px 8px;font-size:13px;font-family:inherit;}
  .ctrl-btn:disabled{opacity:0.25;cursor:default;}
  .ctrl-btn.blue{color:#58a6ff;}
  .ctrl-btn.red{color:#f85149;}

  /* TAG BADGE */
  .tag-badge{font-size:10px;font-weight:800;letter-spacing:1.5px;padding:2px 8px;border-radius:12px;}
  .tag-dvs{background:#1a3a5c;color:#5eb8ff;border:1px solid #5eb8ff33;}
  .tag-upok{background:#2d1a1a;color:#ff7a5c;border:1px solid #ff7a5c33;}
  .tag-electric{background:#2a1a2d;color:#c47aff;border:1px solid #c47aff33;}
  .tag-other{background:#1a2d1a;color:#6edc6e;border:1px solid #6edc6e33;}

  /* FILTER BUTTONS */
  .fb-all.active{background:#21262d;border-color:#8b949e;color:#c9d1d9;}
  .fb-all{border:1px solid #21262d;background:transparent;color:#555;}
  .fb-dvs.active{background:#1a3a5c;border-color:#5eb8ff;color:#5eb8ff;}
  .fb-dvs{border:1px solid #21262d;background:transparent;color:#555;}
  .fb-upok.active{background:#2d1a1a;border-color:#ff7a5c;color:#ff7a5c;}
  .fb-upok{border:1px solid #21262d;background:transparent;color:#555;}
  .fb-electric.active{background:#2a1a2d;border-color:#c47aff;color:#c47aff;}
  .fb-electric{border:1px solid #21262d;background:transparent;color:#555;}
  .fb-other.active{background:#1a2d1a;border-color:#6edc6e;color:#6edc6e;}
  .fb-other{border:1px solid #21262d;background:transparent;color:#555;}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  .overlay.open{opacity:1;pointer-events:all;}
  .modal{background:#161b22;border:1px solid #30363d;border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:28px;transform:translateY(12px);transition:transform 0.2s;}
  .overlay.open .modal{transform:translateY(0);}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
  .modal-head h2{font-family:'Syne',sans-serif;font-size:18px;}
  .modal-x{background:none;border:none;color:#888;font-size:20px;cursor:pointer;}
  .field-label{display:block;color:#7d8590;font-size:12px;margin-bottom:6px;font-weight:600;letter-spacing:0.5px;}
  .field-group{margin-bottom:16px;}
  .field{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#e6edf3;font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color 0.2s;}
  .field:focus{border-color:#58a6ff;}
  textarea.field{resize:vertical;min-height:72px;}
  .tag-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .tp-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all 0.15s;border:1px solid #333;background:#0d1117;color:#666;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;padding-top:16px;border-top:1px solid #21262d;}

  /* LOAD PANEL */
  .load-panel{max-width:720px;margin:0 auto 16px;background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px 20px;display:none;}
  .load-panel.open{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .load-panel p{font-size:12px;color:#7d8590;flex:1;}

  .empty{color:#555;text-align:center;padding:40px;}
  .footer-hint{color:#333;font-size:11px;text-align:center;margin-top:32px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Knowledge Editor</h1>
      <p class="header-meta" id="countLabel">0 документов</p>
    </div>
    <div class="header-buttons">
      <button class="btn btn-load" onclick="toggleLoadPanel()">↑ Загрузить JSON</button>
      <button class="btn btn-copy" id="btnCopy" onclick="copyJson()">Копировать JSON</button>
      <button class="btn btn-export" onclick="exportJson()">↓ Скачать JSON</button>
      <button class="btn btn-add" onclick="openAdd()">+ Добавить</button>
    </div>
  </div>
</div>

<!-- Load existing JSON -->
<div class="load-panel" id="loadPanel">
  <p>Загрузите существующий <code>knowledge.json</code> чтобы продолжить редактирование:</p>
  <input type="file" id="jsonFileInput" accept=".json" style="display:none" onchange="loadJsonFile(this)">
  <button class="btn btn-load" onclick="document.getElementById('jsonFileInput').click()">Выбрать файл</button>
</div>

<!-- Search -->
<div class="search-wrap">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="text" id="searchInput" placeholder="Поиск по названию и описанию..." oninput="render()">
</div>

<!-- Filters -->
<div class="filters" id="filters"></div>

<!-- List -->
<div class="list" id="list"></div>
<p class="footer-hint">Скачайте JSON и замените файл <code>knowledge.json</code> на сервере. PDF-файлы кладите в папку <code>pdfs/</code></p>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Новый документ</h2>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>

    <label class="field-label">Категория</label>
    <div class="tag-picker" id="tagPicker"></div>

    <div class="field-group">
      <label class="field-label">Название *</label>
      <input class="field" id="fTitle" placeholder="Suzuki DF250AP — Руководство по эксплуатации">
    </div>

    <div class="field-group">
      <label class="field-label">Описание</label>
      <textarea class="field" id="fDesc" placeholder="Ключевые слова, марка, модель, разделы — по ним работает поиск"></textarea>
    </div>

    <div class="field-group">
      <label class="field-label">Путь к файлу</label>
      <input class="field" id="fFile" placeholder="pdfs/suzuki_df250ap.pdf">
      <div style="color:#555;font-size:11px;margin-top:6px;">Файл должен лежать на сервере в той же папке, что и knowledge.json</div>
    </div>

    <div class="field-group">
      <label class="field-label">Размер файла</label>
      <input class="field" id="fSize" placeholder="8.2 МБ">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" id="btnSave" onclick="saveDoc()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const CATS = [
  { id:'dvs',      label:'Двигатели ДВС' },
  { id:'upok',     label:'УПОК' },
  { id:'electric', label:'Электрика' },
  { id:'other',    label:'Прочее' },
];
const TAG_COLORS = {
  dvs:     { bg:'#1a3a5c', text:'#5eb8ff' },
  upok:    { bg:'#2d1a1a', text:'#ff7a5c' },
  electric:{ bg:'#2a1a2d', text:'#c47aff' },
  other:   { bg:'#1a2d1a', text:'#6edc6e' },
};

let docs = [];
let filterCat = 'all';
let modalMode = null; // 'add' | 'edit'
let editIdx = -1;
let modalCat = 'dvs';

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  renderFilters();
  renderList();
  document.getElementById('countLabel').textContent = docs.length + ' документов';
}

function renderFilters() {
  const el = document.getElementById('filters');
  const all = [{ id:'all', label:'Все' }, ...CATS];
  el.innerHTML = all.map(c => {
    const count = c.id === 'all' ? docs.length : docs.filter(d => d.cat === c.id).length;
    const active = filterCat === c.id;
    const tc = TAG_COLORS[c.id] || { text:'#8b949e', bg:'#21262d' };
    const bc = active ? (c.id === 'all' ? '#8b949e' : tc.text) : '#21262d';
    const bg = active ? (c.id === 'all' ? '#21262d' : tc.bg) : 'transparent';
    const col = active ? (c.id === 'all' ? '#c9d1d9' : tc.text) : '#555';
    return `<button class="filter-btn" onclick="setFilter('${c.id}')"
      style="border-color:${bc};background:${bg};color:${col}"
    >${c.label} <span style="opacity:.6">${count}</span></button>`;
  }).join('');
}

function renderList() {
  const el = document.getElementById('list');
  const q = document.getElementById('searchInput').value.toLowerCase().trim();

  const indices = docs
    .map((d, i) => i)
    .filter(i => {
      const d = docs[i];
      const mc = filterCat === 'all' || d.cat === filterCat;
      const mq = !q || (d.title||'').toLowerCase().includes(q) || (d.desc||'').toLowerCase().includes(q);
      return mc && mq;
    });

  if (indices.length === 0) {
    el.innerHTML = `<p class="empty">${docs.length === 0 ? 'Нет документов. Загрузите JSON или добавьте первый документ.' : 'Ничего не найдено.'}</p>`;
    return;
  }

  el.innerHTML = indices.map(i => {
    const d = docs[i];
    const tc = TAG_COLORS[d.cat] || TAG_COLORS.other;
    const catLabel = CATS.find(c => c.id === d.cat)?.label || d.cat;
    return `
    <div class="card">
      <span class="card-idx">${i + 1}</span>
      <div class="card-body">
        <div class="card-top">
          <span class="tag-badge" style="background:${tc.bg};color:${tc.text};border:1px solid ${tc.text}33">${catLabel}</span>
          <span class="card-title">${esc(d.title)}</span>
        </div>
        <p class="card-desc">${esc(d.desc||'')}</p>
        <p class="card-meta">${esc(d.file||'—')} · ${esc(d.size||'')}</p>
      </div>
      <div class="card-controls">
        <button class="ctrl-btn" onclick="moveUp(${i})" ${i===0?'disabled':''} title="Вверх">↑</button>
        <button class="ctrl-btn" onclick="moveDown(${i})" ${i===docs.length-1?'disabled':''} title="Вниз">↓</button>
        <button class="ctrl-btn blue" onclick="openEdit(${i})" title="Редактировать">✎</button>
        <button class="ctrl-btn red" onclick="deleteDoc(${i})" title="Удалить">✕</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── ACTIONS ────────────────────────────────────────────────────────────────
function setFilter(cat) { filterCat = cat; render(); }

function moveUp(i) {
  if (i === 0) return;
  [docs[i-1], docs[i]] = [docs[i], docs[i-1]];
  render();
}
function moveDown(i) {
  if (i === docs.length - 1) return;
  [docs[i+1], docs[i]] = [docs[i], docs[i+1]];
  render();
}
function deleteDoc(i) {
  if (confirm('Удалить «' + docs[i].title + '»?')) {
    docs.splice(i, 1);
    render();
  }
}

// ── JSON IO ────────────────────────────────────────────────────────────────
function toggleLoadPanel() {
  const p = document.getElementById('loadPanel');
  p.classList.toggle('open');
}

function loadJsonFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Не массив');
      docs = data;
      render();
      document.getElementById('loadPanel').classList.remove('open');
      alert(`Загружено ${docs.length} документов.`);
    } catch(err) {
      alert('Ошибка: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function exportJson() {
  const blob = new Blob([JSON.stringify(docs, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'knowledge.json';
  a.click();
}

function copyJson() {
  navigator.clipboard.writeText(JSON.stringify(docs, null, 2));
  const btn = document.getElementById('btnCopy');
  btn.textContent = '✓ Скопировано';
  btn.classList.add('ok');
  setTimeout(() => { btn.textContent = 'Копировать JSON'; btn.classList.remove('ok'); }, 2000);
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function renderTagPicker() {
  document.getElementById('tagPicker').innerHTML = CATS.map(c => {
    const tc = TAG_COLORS[c.id];
    const active = modalCat === c.id;
    return `<button class="tp-btn" onclick="pickCat('${c.id}')"
      style="border-color:${active?tc.text:'#333'};background:${active?tc.bg:'#0d1117'};color:${active?tc.text:'#666'}"
    >${c.label}</button>`;
  }).join('');
}

function pickCat(id) { modalCat = id; renderTagPicker(); }

function openAdd() {
  modalMode = 'add'; modalCat = 'dvs';
  document.getElementById('modalTitle').textContent = 'Новый документ';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fFile').value = '';
  document.getElementById('fSize').value = '';
  renderTagPicker();
  updateSaveBtn();
  document.getElementById('overlay').classList.add('open');
}

function openEdit(i) {
  modalMode = 'edit'; editIdx = i;
  const d = docs[i];
  modalCat = d.cat || 'other';
  document.getElementById('modalTitle').textContent = 'Редактировать документ';
  document.getElementById('fTitle').value = d.title || '';
  document.getElementById('fDesc').value = d.desc || '';
  document.getElementById('fFile').value = d.file || '';
  document.getElementById('fSize').value = d.size || '';
  renderTagPicker();
  updateSaveBtn();
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function handleOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function updateSaveBtn() {
  const ok = document.getElementById('fTitle').value.trim() !== '';
  const btn = document.getElementById('btnSave');
  btn.disabled = !ok;
}

document.getElementById('fTitle').addEventListener('input', updateSaveBtn);

function saveDoc() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) return;
  const doc = {
    cat: modalCat,
    title,
    desc: document.getElementById('fDesc').value.trim(),
    file: document.getElementById('fFile').value.trim(),
    size: document.getElementById('fSize').value.trim(),
  };
  if (modalMode === 'add') {
    docs.push(doc);
  } else {
    docs[editIdx] = doc;
  }
  closeModal();
  render();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── INIT ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
